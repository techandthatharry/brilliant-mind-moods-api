name: Nightly Database Backup

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC every night
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout with full history so we can switch/create branches ──────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Switch to (or create) the backups branch ──────────────────────────
      - name: Ensure backups branch exists
        run: |
          if git ls-remote --heads origin backups | grep -q backups; then
            git checkout backups
          else
            git checkout --orphan backups
            git rm -rf .
            echo "# Database Backups" > README.md
            echo "Nightly backups of the Brilliant Mind Moods MySQL database." >> README.md
            echo "Kept for 30 days. Restore with: \`gunzip -c backup-YYYY-MM-DD.sql.gz | mysql -h HOST -u USER -p DBNAME\`" >> README.md
            git add README.md
            git commit -m "Initialise backups branch"
            git push origin backups
          fi

      # ── 3. Dump the database ─────────────────────────────────────────────────
      - name: Create database dump
        env:
          MYSQL_PWD: ${{ secrets.RAILWAY_DB_PASS }}
        run: |
          mysqldump \
            -h "${{ secrets.RAILWAY_DB_HOST }}" \
            -P "${{ secrets.RAILWAY_DB_PORT }}" \
            -u "${{ secrets.RAILWAY_DB_USER }}" \
            --single-transaction \
            --routines \
            --triggers \
            --set-gtid-purged=OFF \
            "${{ secrets.RAILWAY_DB_NAME }}" \
          | gzip > "backup-$(date +%Y-%m-%d).sql.gz"

          echo "Backup size: $(du -h backup-$(date +%Y-%m-%d).sql.gz | cut -f1)"

      # ── 4. Prune — keep only the last 30 backups ────────────────────────────
      - name: Remove backups older than 30 days
        run: |
          COUNT=$(ls backup-*.sql.gz 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 30 ]; then
            ls -t backup-*.sql.gz | tail -n +31 | xargs rm -f
            echo "Pruned old backups, keeping 30 most recent."
          fi

      # ── 5. Commit and push ───────────────────────────────────────────────────
      - name: Commit and push backup
        run: |
          git config user.name  "Backup Bot"
          git config user.email "noreply@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Backup $(date +%Y-%m-%d)"
            git push origin backups
          fi
